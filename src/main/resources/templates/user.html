<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VLU Student Portal - Hệ thống quản lý</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="globalLoading">
    <div class="loading-spinner">
        <i class="fas fa-spinner fa-spin"></i>
        <div class="loading-text">Đang tải...</div>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Main Portal -->
<div class="portal-wrapper">
    <!-- Header -->
    <header class="vlu-main-header">
        <div class="header-left">
            <h4 class="mb-0">
                <i class="fas fa-university me-2"></i>VLU Student Portal
            </h4>
            <span class="text-white-50 small">— Hệ thống quản lý</span>
        </div>

        <div class="header-right">

            <!-- ADMIN BUTTON -->
            <button
                    id="adminBtn"
                    class="btn btn-warning btn-sm d-none"
                    onclick="loadTab('admin-sv')">
                <i class="fas fa-shield-alt me-1"></i> Admin
            </button>

            <!-- USER DROPDOWN -->
            <div class="dropdown">
                <div class="user-dropdown-trigger dropdown-toggle" data-bs-toggle="dropdown">
                    <span id="userInfo">Đang tải...</span>
                    <i class="fa-solid fa-caret-down"></i>
                </div>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" onclick="loadTab('profile')"><i class="fas fa-user me-2"></i>Thông tin cá nhân</a></li>
                    <li><a class="dropdown-item" onclick="openPwdModal()"><i class="fas fa-key me-2"></i>Đổi mật khẩu</a></li>
                    <li><hr class="dropdown-divider m-0"></li>
                    <li><a class="dropdown-item" onclick="loadTab('notifications')">
                        <i class="fas fa-bell me-2"></i>Thông báo
                        <span class="badge bg-danger badge-sm ms-1" id="notificationMenuBadge" style="display: none;">0</span>
                    </a></li>
                    <li><a class="dropdown-item" th:href="@{/logout}"><i class="fas fa-sign-out-alt me-2"></i>Đăng xuất</a></li>
                </ul>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="portal-main">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-title">
                <i class="fa-solid fa-bars me-2"></i> Chức năng
            </div>
            <div class="nav-group">
                <div class="nav-main-item">Trang cá nhân</div>

                <!-- Menu sẽ được load động theo vai trò -->
                <div id="dynamicMenu"></div>
            </div>
        </aside>

        <!-- Content Area -->
        <main class="content-container">
            <div class="content-header-bar" id="pageTitle">
                <span>Đang tải...</span>
            </div>

            <div class="content-body" id="mainContentArea">
                <div class="text-center py-5">
                    <i class="fas fa-spinner fa-spin fa-2x text-muted mb-3"></i>
                    <p class="text-muted">Đang tải dữ liệu...</p>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Modal Container -->
<div id="modalContainer"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/core.js}"></script>
<script th:src="@{/js/profile.js}"></script>
<script th:src="@{/js/password.js}"></script>
<script th:src="@{/js/student-management.js}"></script>
<script th:src="@{/js/department-management.js}"></script>
<script th:src="@{/js/ctdt-management.js}"></script>
<script th:src="@{/js/user-ctdt.js}"></script>
<script th:src="@{/js/notifications.js}"></script>
<script th:src="@{/js/chatbot.js}"></script>
<script th:src="@{/js/export-excel.js}"></script>

</body>
</html>
