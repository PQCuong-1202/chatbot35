<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="departmentSection">
    <!-- Quản lý ngành -->
    <div class="department-management">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="text-secondary mb-0">
                <i class="fas fa-list-ul me-2"></i>Danh sách ngành và chuyên ngành
            </h5>
            <button class="btn btn-vlu-blue btn-sm px-3" onclick="openDepartmentModal()">
                <i class="fas fa-plus me-1"></i> Thêm mới
            </button>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body p-3">
                <div class="row g-3 align-items-center">
                    <div class="col-md-5">
                        <input type="text" id="searchDeptKeyword" class="form-control form-control-sm"
                               placeholder="Tìm theo ngành hoặc chuyên ngành">
                    </div>
                    <div class="col-md-3">
                        <select id="filterDeptName" class="form-select form-select-sm">
                            <option value="">-- Tìm theo ngành --</option>
                        </select>
                    </div>
                    <div class="col-md-1 text-center">
                        <button class="btn btn-light btn-sm border w-100" onclick="searchDepartments()" title="Tìm kiếm">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-outline-secondary btn-sm w-100" onclick="resetDeptSearch()"
                                style="font-size: 12px;">
                            Reset tìm kiếm
                        </button>
                    </div>
                    <div class="col-md-1 text-end">
                        <span class="small text-muted">
                            Hiển thị: <span id="deptCount">0</span>
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered text-center align-middle shadow-sm" style="font-size: 13px;">
                <thead class="admin-table-header">
                <tr>
                    <th width="80">STT</th>
                    <th>Ngành</th>
                    <th>Chuyên ngành</th>
                    <th width="150">Tác vụ</th>
                </tr>
                </thead>
                <tbody id="deptTableBody">
                <tr>
                    <td colspan="4" class="text-center py-5">
                        <div class="spinner-border spinner-border-sm text-primary me-2"></div>
                        Đang tải dữ liệu...
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
