<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="listSection">
    <!-- Quản lý sinh viên -->
    <div class="student-management">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="text-secondary mb-0">
                <i class="fas fa-users me-2"></i>Danh sách sinh viên
            </h5>
            <div class="d-flex gap-2">
                <div class="dropdown">
                    <button class="btn btn-outline-vlu-blue btn-sm dropdown-toggle" type="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fas fa-sort me-1"></i>Sắp xếp
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#" onclick="sortStudents('recent')">
                            <i class="fas fa-clock me-2"></i>Mới nhất
                        </a></li>
                        <li><a class="dropdown-item" href="#" onclick="sortStudents('name')">
                            <i class="fas fa-sort-alpha-down me-2"></i>Tên A-Z
                        </a></li>
                        <li><a class="dropdown-item" href="#" onclick="sortStudents('mssv')">
                            <i class="fas fa-hashtag me-2"></i>MSSV
                        </a></li>
                    </ul>
                </div>
                <button class="btn btn-vlu-blue btn-sm" onclick="openStudentModal()">
                    <i class="fas fa-plus me-1"></i> Thêm sinh viên
                </button>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body p-3">
                <div class="row g-3 align-items-center">
                    <div class="col-md-4">
                        <input type="text" id="searchStudentKeyword" class="form-control form-control-sm"
                               placeholder="Tìm theo tên hoặc MSSV">
                    </div>
                    <div class="col-md-3">
                        <select id="filterStudentDept" class="form-select form-select-sm">
                            <option value="">-- Tìm theo ngành --</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select id="filterStudentMajor" class="form-select form-select-sm">
                            <option value="">-- Tìm theo chuyên ngành --</option>
                        </select>
                    </div>

                    <!-- THÊM TÌM KIẾM THEO KHÓA -->
                    <div class="col-md-2">
                        <select id="filterStudentCourse" class="form-select form-select-sm">
                            <option value="">-- Khóa --</option>
                            <option value="K26">K26</option>
                            <option value="K27">K27</option>
                            <option value="K28">K28</option>
                            <option value="K29">K29</option>
                            <option value="K30">K30</option>
                        </select>
                    </div>
                    <div class="col-md-1 text-center">
                        <button class="btn btn-light btn-sm border w-100" onclick="searchStudents()" title="Tìm kiếm">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                    <div class="col-md-1">
                        <button class="btn btn-outline-secondary btn-sm w-100" onclick="resetStudentSearch()"
                                style="font-size: 12px;">
                            Reset
                        </button>
                    </div>
                    <div class="col-md-2 text-start">
                        <span class="small text-muted">
                            Hiển thị: <span id="studentCount">0</span>
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <div class="alert alert-info alert-dismissible fade show mb-3" role="alert" id="newStudentAlert" style="display: none;">
            <i class="fas fa-info-circle me-2"></i>
            <strong>Sinh viên mới</strong> sẽ được đánh dấu <span class="badge bg-danger badge-sm"><i class="fas fa-star me-1"></i>MỚI</span> và hiển thị đầu danh sách
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered text-center align-middle shadow-sm" style="font-size: 13px;">
                <thead class="admin-table-header">
                <tr>
                    <th width="50">STT</th>
                    <th>MSSV</th>
                    <th>Họ và tên</th>
                    <th>Ngày sinh</th>
                    <th>Ngành & Ngành</th>
                    <th>Khóa</th>
                    <th>Trạng thái</th>
                    <th width="140">Thao tác</th>
                </tr>
                </thead>
                <tbody id="studentTableBody">
                <tr>
                    <td colspan="8" class="text-center py-5">
                        <div class="spinner-border spinner-border-sm text-primary me-2"></div>
                        Đang tải dữ liệu...
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
